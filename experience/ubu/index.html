  <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer" hidden>
    <button class="lightbox__close" type="button" aria-label="Close (Esc)">×</button>
    <img class="lightbox__img" alt="" />
  </div>
  <script>
    (function () {
      var shots = document.querySelectorAll("a.ev-shot");
      if (!shots.length) return;
      var box = document.getElementById("lightbox");
      var img = box.querySelector(".lightbox__img");
      var closeBtn = box.querySelector(".lightbox__close");
      var lastFocus = null;
      function open(href, alt) {
        lastFocus = document.activeElement;
        img.src = href;
        img.alt = alt || "";
        box.hidden = false;
        document.body.style.overflow = "hidden";
        closeBtn.focus();
      }
      function close() {
        box.hidden = true;
        img.src = "";
        document.body.style.overflow = "";
        if (lastFocus && lastFocus.focus) lastFocus.focus();
      }
      shots.forEach(function (a) {
        a.addEventListener("click", function (e) {
          e.preventDefault();
          var im = a.querySelector("img");
          open(a.getAttribute("href"), im ? im.alt : "");
        });
      });
      box.addEventListener("click", function (e) {
        if (e.target === box || e.target === img) close();
      });
      closeBtn.addEventListener("click", close);
      document.addEventListener("keydown", function (e) {
        if (!box.hidden && e.key === "Escape") close();
      });
    })();
  </script>
